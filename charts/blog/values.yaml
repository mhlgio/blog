replicaCount: 1

image:
  repository: git.home.mhlg.io/matehal/blog
  # Argo CD sets this to $ARGOCD_APP_REVISION; local installs must pass it.
  tag: ""
  pullPolicy: Always

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: blog.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

traefik:
  redirectToHttps:
    enabled: false
    permanent: true

resources: {}

podAnnotations: {}
podLabels: {}

nodeSelector: {}
tolerations: []
affinity: {}
